[[oracles]]
type = "mock"
initial_price = 1.0
incremental_change = 0.00000000000001
smoothing_interval = 15
initial_direction_up = true
poll_interval_ms = 10000

# Cross-version overlay: only the fields the new binary requires that the
# old genesis (d071fc03) doesn't serve via /v1/network/config. Everything
# the genesis already knows about (chain_id, genesis block, vdf, etc) is
# left to the harness to fill in from the running genesis at upgrade time.
[consensus.Custom]
num_partitions_per_term_ledger_slot = 1

[consensus.Custom.hardforks.aurora]
activation_timestamp = "2099-01-01T00:00:00+00:00"
minimum_commitment_tx_version = 2

[consensus.Custom.hardforks.borealis]
activation_timestamp = "2099-01-01T00:00:00+00:00"
