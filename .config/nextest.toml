# default config can be viewed at https://nexte.st/docs/configuration/
experimental = ["wrapper-scripts"]

[test-groups]
serial = { max-threads = 1 }
# Spiky tests have brief CPU spikes that can interfere under high concurrency.
# max-threads limits how many run simultaneously. Lower = more stable but slower.
# Target: reduce toward 1 as tests become more contention-resilient.
spiky = { max-threads = 3 }


[profile.default]
slow-timeout = { period = "30s", terminate-after = 2 }
threads-required = 1
retries = 0

# serial tests
[[profile.default.overrides]]
filter = 'test(/.*serial_.*/)'
test-group = 'serial'

# slow tests
[[profile.default.overrides]]
filter = 'test(/.*slow_.*/)'
slow-timeout = { period = "90s", terminate-after = 2 }
priority = 100

# heavy tests (exclude spiky — they manage their own threads-required)
[[profile.default.overrides]]
filter = 'test(/.*heavy_.*/) - test(/.*spiky_.*/)'
threads-required = 2

# heavy3 tests (exclude spiky)
[[profile.default.overrides]]
filter = 'test(/.*heavy3_.*/) - test(/.*spiky_.*/)'
threads-required = 3

# heavy4 tests (exclude spiky)
[[profile.default.overrides]]
filter = 'test(/.*heavy4_.*/) - test(/.*spiky_.*/)'
threads-required = 4

# spiky tests — CPU spikes justify reservation, but group limits concurrency
# so we can safely set threads-required = 1 (freeing slots for other tests)
[[profile.default.overrides]]
filter = 'test(/.*spiky_.*/)'
test-group = 'spiky'
threads-required = 1
priority = 100


# Define the monitoring wrapper script
[scripts.wrapper.nextest-monitor]
command = 'nextest-wrapper'

[profile.heap-profile]
test-threads = 1                                        # Reduce parallelism during profiling (less noise)
slow-timeout = { period = "120s", terminate-after = 2 } # Allow extra time for profiling overhead

[profile.cpu-profile]
test-threads = 1


# Apply wrapper to all tests in cpu-profile
[[profile.cpu-profile.scripts]]
filter = 'all()'
run-wrapper = 'nextest-monitor'
