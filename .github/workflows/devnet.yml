name: Devnet Build

concurrency:
  group: devnet
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA on deployment/devnet (defaults to HEAD of the branch)'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: build and push devnet image
    runs-on: [self-hosted, misc-runner]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate inputs
        env:
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          if [ -n "$INPUT_COMMIT" ] && ! [[ "$INPUT_COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $INPUT_COMMIT"
            exit 1
          fi

      # GHA expressions have no ternary; the && / || idiom below works because
      # the truthy branch is non-empty when the condition is true, so the ||
      # fallback only fires when inputs.commit is empty.
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit != '' && inputs.commit || 'deployment/devnet' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve commit
        id: resolve
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=$(echo "$SHA" | cut -c1-12)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Validate commit is on deployment/devnet
        env:
          COMMIT_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          BRANCHES=$(git branch -r --contains "${COMMIT_SHA}" | grep 'origin/deployment/devnet$' || true)
          if [ -z "$BRANCHES" ]; then
            echo "::error::Commit ${COMMIT_SHA} is not on deployment/devnet"
            echo "Found on branches:"
            git branch -r --contains "${COMMIT_SHA}"
            exit 1
          fi
          echo "Commit on deployment/devnet"

      - name: Set image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LOWER}/irys-devnet" >> "$GITHUB_OUTPUT"

      - name: Start rootless Docker and log in to GHCR
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        env:
          COMMIT_SHA: ${{ steps.resolve.outputs.sha }}
          SHORT_SHA: ${{ steps.resolve.outputs.short }}
        run: |
          docker build \
            --file ./docker/Dockerfile.release \
            --build-arg GIT_COMMIT="${COMMIT_SHA}" \
            --build-arg GIT_SHA="${COMMIT_SHA}" \
            --build-arg GIT_HAS_TAG=false \
            --build-arg GIT_DIRTY=false \
            --tag "${{ steps.image.outputs.name }}:${SHORT_SHA}" \
            --tag "${{ steps.image.outputs.name }}:latest" \
            .

      - name: Push images
        env:
          SHORT_SHA: ${{ steps.resolve.outputs.short }}
        run: |
          docker push "${{ steps.image.outputs.name }}:${SHORT_SHA}"
          docker push "${{ steps.image.outputs.name }}:latest"

      - name: Tear down rootless Docker
        if: always()
        uses: ./.github/actions/docker-cleanup
