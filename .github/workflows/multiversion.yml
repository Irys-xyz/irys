name: Multiversion Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request_review:
    types: [submitted]

concurrency:
  group: multiversion-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  multiversion-tests:
    name: Cross-version integration tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, misc-runner]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install rust (respect toolchain file)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt,clippy,cargo,llvm-tools-preview
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Run multiversion tests
        run: cargo xtask multiversion-test --profile dev --old-ref ${{ github.event_name == 'push' && github.event.before || 'origin/master' }} --new-ref HEAD --clean
