name: Docker Rebuild

# Serialize with release.yml / docker-retag.yml (same group) so a manual rebuild
# can't race a release or rollback and overwrite :latest or a version tag
# mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment whose image stream to rebuild into'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
          - devnet
      commit:
        description: 'Commit SHA to rebuild (the source commit for this image)'
        required: true
        type: string
      tag:
        description: 'Existing image tag to rebuild (e.g., 1.2.3)'
        required: true
        type: string
      tag_latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    name: build and push docker image
    runs-on: [self-hosted, misc-runner]
    # Gated by the GitHub Environment named after `inputs.environment`. This
    # workflow can republish to any image stream — put required reviewers on
    # the mainnet (and probably testnet) environments in repo settings to
    # prevent accidental overwrites. All three envs (devnet/testnet/mainnet)
    # must exist or the workflow fails.
    environment: ${{ inputs.environment }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate inputs
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          if ! [[ "$INPUT_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid commit SHA: $INPUT_COMMIT (expected full 40-char SHA; abbreviated SHAs are not accepted by actions/checkout)"
            exit 1
          fi
          if [[ "$INPUT_ENVIRONMENT" == "devnet" ]]; then
            # devnet images are tagged by short-sha — allow the looser format
            if ! [[ "$INPUT_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid tag format: $INPUT_TAG"
              exit 1
            fi
          else
            # testnet/mainnet rebuild a released version — tag must be semver X.Y.Z
            if ! [[ "$INPUT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::For $INPUT_ENVIRONMENT, tag must be semver X.Y.Z, got: $INPUT_TAG"
              exit 1
            fi
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          # Credentials persisted (read-only token): the provenance check below
          # resolves the <env>-<tag> release tag from origin to confirm the
          # rebuild targets the exact released commit.

      - name: Sync tags from origin (local tags on reused runners can be stale)
        uses: ./.github/actions/sync-tags

      # Don't let the rebuild path publish a mislabeled image. For testnet/mainnet,
      # require-release-tag also pins the commit to the exact one <env>-<tag>
      # points at (a rebuild must reproduce the released commit). devnet only
      # checks the deployment branch. See the verify-commit-provenance action.
      - name: Validate commit provenance
        uses: ./.github/actions/verify-commit-provenance
        with:
          environment: ${{ inputs.environment }}
          commit: ${{ inputs.commit }}
          version: ${{ inputs.tag }}
          require-release-tag: ${{ inputs.environment != 'devnet' }}

      - name: Set lowercase image name
        id: image
        uses: ./.github/actions/image-name
        with:
          environment: ${{ inputs.environment }}

      - name: Start rootless Docker and log in to GHCR
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # testnet/mainnet rebuild a tagged release, so the embedded version must
      # match the original (X.Y.Z+irys, has_tag=true). devnet has no release
      # tag (has_tag=false → X.Y.Z+irys.<sha>). See crates/chain/build.rs.
      - name: Build Docker image
        uses: ./.github/actions/docker-build
        with:
          commit: ${{ inputs.commit }}
          has-tag: ${{ inputs.environment != 'devnet' }}
          image: ${{ steps.image.outputs.name }}
          tag: ${{ inputs.tag }}

      - name: Push Docker image
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: docker push "${IMAGE}:${INPUT_TAG}"

      - name: Tag as latest
        if: ${{ inputs.tag_latest }}
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          docker tag "${IMAGE}:${INPUT_TAG}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

      - name: Tear down rootless Docker
        if: always()
        uses: ./.github/actions/docker-cleanup
