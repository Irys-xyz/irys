name: Docker Rebuild

# Serialize with release.yml / docker-retag.yml (same group) so a manual rebuild
# can't race a release or rollback and overwrite :latest or a version tag
# mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment whose image stream to rebuild into'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
          - devnet
      commit:
        description: 'Commit SHA to rebuild (the source commit for this image)'
        required: true
        type: string
      tag:
        description: 'Existing image tag to rebuild (e.g., 1.2.3)'
        required: true
        type: string
      tag_latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    name: build and push docker image
    runs-on: [self-hosted, misc-runner]
    # Gated by the GitHub Environment named after `inputs.environment`. This
    # workflow can republish to any image stream — put required reviewers on
    # the mainnet (and probably testnet) environments in repo settings to
    # prevent accidental overwrites. All three envs (devnet/testnet/mainnet)
    # must exist or the workflow fails.
    environment: ${{ inputs.environment }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate inputs
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          if ! [[ "$INPUT_COMMIT" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::Invalid commit SHA format: $INPUT_COMMIT"
            exit 1
          fi
          if [[ "$INPUT_ENVIRONMENT" == "devnet" ]]; then
            # devnet images are tagged by short-sha — allow the looser format
            if ! [[ "$INPUT_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid tag format: $INPUT_TAG"
              exit 1
            fi
          else
            # testnet/mainnet rebuild a released version — tag must be semver X.Y.Z
            if ! [[ "$INPUT_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::For $INPUT_ENVIRONMENT, tag must be semver X.Y.Z, got: $INPUT_TAG"
              exit 1
            fi
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          # Credentials persisted (read-only token): the provenance check below
          # resolves the <env>-<tag> release tag from origin to confirm the
          # rebuild targets the exact released commit.

      - name: Sync tags from origin (local tags on reused runners can be stale)
        run: git fetch origin --force --prune --prune-tags "+refs/tags/*:refs/tags/*"

      # Mirror release.yml / devnet.yml: don't let the rebuild path publish a
      # mislabeled image. The commit must live on the matching deployment branch,
      # for testnet/mainnet the Cargo.toml version must equal the tag, and the
      # commit must be the exact one the <env>-<tag> release tag points at.
      - name: Validate commit provenance
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_COMMIT: ${{ inputs.commit }}
        run: |
          if ! git cat-file -e "${INPUT_COMMIT}^{commit}" 2>/dev/null; then
            echo "::error::Commit ${INPUT_COMMIT} does not exist"
            exit 1
          fi

          if [[ "$INPUT_ENVIRONMENT" == "devnet" ]]; then
            EXPECTED_BRANCH="origin/deployment/devnet"
          else
            MAJOR="${INPUT_TAG%%.*}"
            EXPECTED_BRANCH="origin/deployment/${INPUT_ENVIRONMENT}/${MAJOR}.x"
          fi
          if ! git branch -r --contains "${INPUT_COMMIT}" \
              | sed 's/^[[:space:]]*//' \
              | grep -Fxq "$EXPECTED_BRANCH"; then
            echo "::error::Commit ${INPUT_COMMIT} is not on $EXPECTED_BRANCH"
            echo "Found on branches:"
            git branch -r --contains "${INPUT_COMMIT}"
            exit 1
          fi

          if [[ "$INPUT_ENVIRONMENT" != "devnet" ]]; then
            CARGO_VER=$(git show "${INPUT_COMMIT}:crates/chain/Cargo.toml" \
              | python3 -c 'import sys,tomllib; print(tomllib.loads(sys.stdin.read())["package"]["version"])')
            if [ "$CARGO_VER" != "${INPUT_TAG}" ]; then
              echo "::error::Tag ${INPUT_TAG} does not match irys-chain Cargo.toml version $CARGO_VER at ${INPUT_COMMIT}"
              exit 1
            fi
            echo "Version validated: ${INPUT_TAG} matches irys-chain $CARGO_VER"

            # The Cargo version equals the tag on every commit between two
            # releases (the version only bumps on release/<major>.x), so the
            # check above is not enough to prove this is the *released* commit.
            # Require the commit to be exactly what the <env>-<tag> release tag
            # points at, or a rebuild of irys-<env>:<tag> could overwrite the
            # published image with bits that were never released as that version.
            RELEASE_GIT_TAG="${INPUT_ENVIRONMENT}-${INPUT_TAG}"
            if ! git rev-parse "${RELEASE_GIT_TAG}^{commit}" >/dev/null 2>&1; then
              echo "::error::Release git tag ${RELEASE_GIT_TAG} does not exist — cannot verify rebuild provenance"
              exit 1
            fi
            TAG_COMMIT=$(git rev-parse "${RELEASE_GIT_TAG}^{commit}")
            INPUT_FULL=$(git rev-parse "${INPUT_COMMIT}^{commit}")
            if [ "$TAG_COMMIT" != "$INPUT_FULL" ]; then
              echo "::error::Commit ${INPUT_COMMIT} (${INPUT_FULL}) is not the commit ${RELEASE_GIT_TAG} points at (${TAG_COMMIT}). A rebuild must target the exact released commit."
              exit 1
            fi
            echo "Provenance validated: ${INPUT_COMMIT} is ${RELEASE_GIT_TAG}"
          fi

      - name: Set lowercase image name
        id: image
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LOWER}/irys-${INPUT_ENVIRONMENT}" >> "$GITHUB_OUTPUT"

      - name: Start rootless Docker and log in to GHCR
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          INPUT_COMMIT: ${{ inputs.commit }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          # testnet/mainnet rebuild a tagged release, so the embedded version must
          # match the original (X.Y.Z+irys, has_tag=true). devnet has no release
          # tag (has_tag=false → X.Y.Z+irys.<sha>). See crates/chain/build.rs.
          if [[ "$INPUT_ENVIRONMENT" == "devnet" ]]; then
            GIT_HAS_TAG=false
          else
            GIT_HAS_TAG=true
          fi
          docker build \
            --file ./docker/Dockerfile.release \
            --build-arg GIT_COMMIT="${INPUT_COMMIT}" \
            --build-arg GIT_SHA="${INPUT_COMMIT}" \
            --build-arg GIT_HAS_TAG="${GIT_HAS_TAG}" \
            --build-arg GIT_DIRTY=false \
            --tag ${{ steps.image.outputs.name }}:${{ inputs.tag }} \
            .

          docker push ${{ steps.image.outputs.name }}:${{ inputs.tag }}

      - name: Tag as latest
        if: ${{ inputs.tag_latest }}
        run: |
          docker tag ${{ steps.image.outputs.name }}:${{ inputs.tag }} ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Tear down rootless Docker
        if: always()
        uses: ./.github/actions/docker-cleanup
