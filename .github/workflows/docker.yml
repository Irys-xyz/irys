name: Docker Rebuild

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing image tag to rebuild (e.g., rc-1.2.3, 1.2.3)'
        required: true
        type: string
      tag_latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    name: build and push docker image
    runs-on: [self-hosted, misc-runner]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate inputs
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "$INPUT_TAG" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid tag format: $INPUT_TAG"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LOWER}/irys" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "VERSION=${INPUT_TAG}" >> $GITHUB_OUTPUT

      - name: Start rootless Docker
        run: |
          dockerd-rootless.sh &
          timeout 30 sh -c 'until docker info 2>/dev/null; do sleep 1; done' \
            || { echo "::error::Docker daemon did not start within 30 seconds"; exit 1; }

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            --file ./docker/Dockerfile.release \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg GIT_HAS_TAG=false \
            --build-arg GIT_DIRTY=false \
            --tag ${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }} \
            .

          docker push ${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}

      - name: Tag as latest
        if: ${{ inputs.tag_latest }}
        run: |
          docker tag ${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }} ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Cleanup Docker
        if: always()
        run: |
          # stop all containers
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker system prune -a -f --volumes || true

          # kill daemon
          pkill -f dockerd-rootless.sh || true

          # Wait a moment for cleanup
          sleep 2

          # remove runtime data (ignoring errors)
          rm -rf "${XDG_RUNTIME_DIR:?}"/* || true
          rm -rf ~/.local/share/docker/* || true
