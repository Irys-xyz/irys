name: "Setup Repo Action"
description: "A reusable composite action that setups rust and other common tasks"

runs:
  using: "composite"
  steps:
    - name: Install rust (respect toolchain file)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt,clippy,cargo,llvm-tools-preview
        cache: false

    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v0"
        cache-on-failure: true
        # Persistent self-hosted runners already have tools installed;
        # caching ~/.cargo/bin would just preserve stale binaries.
        cache-bin: "false"
        cache-all-crates: true
        cache-workspace-crates: "true"

    - name: Configure sccache env
      shell: bash
      run: |
        # Kill any leftover sccache daemon from a previous job (persistent
        # runners keep daemons alive). Use both the graceful stop and pkill so
        # the daemon is definitely gone before we restart with new settings.
        sccache --stop-server 2>/dev/null || true
        pkill -x sccache 2>/dev/null || true

        # Create the sccache-wrap alias (see scripts/setup-sccache.sh for why)
        scripts/setup-sccache.sh

        echo "CARGO_BUILD_RUSTC_WRAPPER=$HOME/.local/bin/sccache-wrap" >> "$GITHUB_ENV"
        echo "SCCACHE_DIR=/shared/sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_CACHE_SIZE=40G" >> "$GITHUB_ENV"

    - name: Start sccache
      shell: bash
      env:
        SCCACHE_DIR: /shared/sccache
        SCCACHE_CACHE_SIZE: 40G
      run: |
        sccache --start-server
        sccache --zero-stats
