name: "Setup Repo Action"
description: "A reusable composite action that setups rust and other common tasks"

runs:
  using: "composite"
  steps:
    - name: Install rust (respect toolchain file)
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt,clippy,cargo,llvm-tools-preview
        cache: false

    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "v0"
        cache-on-failure: true
        # Persistent self-hosted runners already have tools installed;
        # caching ~/.cargo/bin would just preserve stale binaries.
        cache-bin: "false"
        cache-all-crates: true
        cache-workspace-crates: "true"

    - name: Configure sccache
      shell: bash
      run: |
        # Use CARGO_BUILD_RUSTC_WRAPPER (cargo config-layer equivalent of RUSTC_WRAPPER)
        # so the setting is scoped to cargo rather than polluting the general environment.
        echo "CARGO_BUILD_RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_DIR=/shared/sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_CACHE_SIZE=40G" >> "$GITHUB_ENV"
        # Intentionally not suppressing errors: fail early if sccache is missing.
        SCCACHE_DIR=/shared/sccache sccache --zero-stats
