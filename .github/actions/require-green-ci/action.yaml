name: "Require green CI"
description: >-
  Fails unless a commit has a fully passing CI result. The release workflow uses
  this to gate a release on the release/<major>.x merge-base — the substantive
  upstream code being shipped — having passed CI, as defense-in-depth on top of
  branch protection. A commit is "fully green" when:
    - it has at least one successful check run (or a green combined commit
      status), proving CI actually ran; AND
    - no check run is still running, and none concluded failure / cancelled /
      timed_out / action_required / stale / startup_failure; AND
    - the combined legacy commit status (if any contexts exist) is success.
  A commit with no CI results at all is a hard failure — absence of a run is not
  proof of a passing run. skipped/neutral check runs are treated as non-blocking,
  matching GitHub's own required-status-check semantics. The caller must pass a
  token with checks:read and statuses:read.

inputs:
  commit:
    description: "Full commit SHA to verify CI status for."
    required: true
  github-token:
    description: "Token with checks:read and statuses:read on this repo."
    required: true
  wait-timeout-seconds:
    description: >-
      Max seconds to wait for still-running CI to finish before evaluating.
      0 (the default) preserves the original fail-fast behavior: any check
      still running is an immediate failure. A positive value polls until every
      check has settled (or the timeout elapses). A commit that concludes with a
      real failure/cancellation fails immediately regardless of this value —
      only in-progress checks are waited on.
    required: false
    default: "0"
  poll-interval-seconds:
    description: "Seconds to sleep between polls while waiting for in-progress CI."
    required: false
    default: "30"

runs:
  using: "composite"
  steps:
    - name: Require green CI for commit
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        SHA: ${{ inputs.commit }}
        WAIT_TIMEOUT: ${{ inputs.wait-timeout-seconds }}
        POLL_INTERVAL: ${{ inputs.poll-interval-seconds }}
      run: |
        set -euo pipefail
        if [ -z "${SHA}" ]; then
          echo "::error::require-green-ci: empty commit input"
          exit 1
        fi

        # Link to GitHub's checks view for this commit so the log has a clickable
        # jump to the live CI runs being gated on.
        CHECKS_URL="${GITHUB_SERVER_URL:-https://github.com}/${REPO}/commit/${SHA}/checks"
        echo "Gating release on CI for ${SHA}"
        echo "  checks: ${CHECKS_URL}"

        # gh has no built-in retry for transient API failures. Under `set -e` a
        # single network blip / 5xx would otherwise abort the whole gate — and the
        # poll loop below makes ~120 calls over a 60-min window, so one such blip
        # anywhere would force a full release re-run. Retry transient failures with
        # backoff. A non-retryable HTTP status (4xx other than 429) is a terminal
        # configuration error — the caller fails fast on it (return 2 →
        # fail_nonretryable_api); an exhausted transient read (return 1) is re-polled
        # in waiting mode, not fatal (see api_error).
        gh_api() {
          local attempt=1 max_attempts=3 out status err_file
          err_file=$(mktemp)
          while true; do
            # Buffer the attempt's output and emit only on success, so a failure
            # part-way through pagination is discarded rather than concatenated
            # onto the retry's (re-fetched-from-page-1) output. Capture stderr so a
            # failure can be classified by its HTTP status.
            if out=$(gh api "$@" 2>"${err_file}"); then
              # Re-add the trailing newline `$(...)` strips: gh's `-q @tsv` output is
              # newline-terminated and the downstream `read` relies on that delimiter.
              rm -f "${err_file}"
              printf '%s\n' "${out}"
              return 0
            fi
            # gh reports HTTP errors as "... (HTTP <code>)" on stderr. A 4xx other
            # than rate-limiting (429) is a terminal config error — bad SHA, missing
            # checks:read/statuses:read scope, 403/404/422 — that neither a retry nor
            # waiting can fix, so signal the caller to fail fast (return 2). 5xx / 429
            # / network errors (no HTTP code) are transient and worth retrying.
            status=$(grep -oE '\(HTTP [0-9]{3}\)' "${err_file}" | grep -oE '[0-9]{3}' | tail -n1 || true)
            if [ -n "${status}" ] && [ "${status}" -ge 400 ] && [ "${status}" -lt 500 ] && [ "${status}" -ne 429 ]; then
              cat "${err_file}" >&2
              rm -f "${err_file}"
              return 2
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              cat "${err_file}" >&2
              rm -f "${err_file}"
              return 1
            fi
            echo "gh api call failed (attempt ${attempt}/${max_attempts}); retrying in $((attempt * 2))s..." >&2
            sleep "$((attempt * 2))"
            attempt=$((attempt + 1))
          done
        }

        # A gh_api read failed with a non-retryable HTTP status (4xx other than
        # rate-limiting): a bad SHA, a repo/permission problem, or a token missing
        # checks:read / statuses:read. Waiting cannot fix a configuration error, so
        # surface it immediately instead of burning the whole wait window first.
        fail_nonretryable_api() {
          echo "::error::GitHub API returned a non-retryable error reading CI status for ${SHA} (e.g. HTTP 404 bad SHA, or a token missing checks:read/statuses:read). Cannot gate the release (${CHECKS_URL}). (Emergency hotfixes can bypass with force=true.)"
          exit 1
        }

        # SECONDS is bash's monotonic elapsed-seconds counter since shell start;
        # the poll loop below waits until SECONDS exceeds this deadline.
        deadline=$((SECONDS + WAIT_TIMEOUT))

        while true; do
          api_error=0    # a read failed after its retries (transient API error)

          # GitHub Actions jobs surface as "check runs"; external CI / bots surface
          # as legacy "commit statuses". A fully passing CI result must satisfy both.
          # filter=latest (the API default) collapses re-runs to the most recent run
          # per check name, so a red run that was later re-run green is not counted.
          if runs_tsv=$(gh_api --paginate \
            "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" \
            -q '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv'); then
            :
          else
            rc=$?
            runs_tsv=""
            if [ "${rc}" -eq 2 ]; then fail_nonretryable_api; fi
            api_error=1
          fi

          fail=0          # a check reached a real, terminal non-pass conclusion
          pending=0       # a check is still running (waitable)
          no_results=0    # no checks/statuses registered yet (also waitable)
          pending_names=""
          successes=0
          total_runs=0
          if [ -n "${runs_tsv}" ]; then
            while IFS=$'\t' read -r name status conclusion; do
              [ -z "${name}" ] && continue
              total_runs=$((total_runs + 1))
              if [ "${status}" != "completed" ]; then
                echo "Check '${name}' is still running (status=${status}) on ${SHA}."
                pending=$((pending + 1))
                pending_names="${pending_names:+${pending_names}, }${name}"
                continue
              fi
              case "${conclusion}" in
                success)
                  successes=$((successes + 1))
                  ;;
                skipped|neutral)
                  # Non-blocking, mirrors GitHub's required-status-check semantics.
                  ;;
                *)
                  echo "::error::Check '${name}' did not pass (conclusion=${conclusion}) on ${SHA}."
                  fail=1
                  ;;
              esac
            done <<< "${runs_tsv}"
          fi

          # Combined legacy status: the .state field is aggregated server-side across
          # every context, so one read is authoritative regardless of context count.
          # One call returns both fields as a TSV (via gh's embedded jq, so no system
          # jq dependency); splitting it into two `gh api` calls would risk reading an
          # inconsistent state/total across a status update mid-poll.
          status_state=""
          status_total=0
          if status_tsv=$(gh_api "repos/${REPO}/commits/${SHA}/status" \
            -q '[.state, .total_count] | @tsv'); then
            IFS=$'\t' read -r status_state status_total <<< "${status_tsv}"
          else
            rc=$?
            if [ "${rc}" -eq 2 ]; then fail_nonretryable_api; fi
            api_error=1
          fi

          if [ "${status_total}" -gt 0 ]; then
            case "${status_state}" in
              success)
                successes=$((successes + 1))
                ;;
              pending)
                echo "Combined commit status for ${SHA} is still pending."
                pending=$((pending + 1))
                pending_names="${pending_names:+${pending_names}, }combined commit status"
                ;;
              *)
                echo "::error::Combined commit status for ${SHA} is '${status_state}' (expected success)."
                fail=1
                ;;
            esac
          fi

          # A real failure is terminal — waiting cannot turn it green, so fail fast
          # even if other checks are still in flight, or if an unrelated status read
          # hit a transient API error this same poll: a check that already concluded
          # red is proven red regardless of the other endpoint. Checked before the
          # api_error branch so a known failure is never deferred behind a read blip.
          if [ "${fail}" -ne 0 ]; then
            echo "::error::CI for ${SHA} is not fully green; refusing to release. (Emergency hotfixes can bypass with force=true.)"
            exit 1
          fi

          # A read failed after exhausting its retries on a transient error (5xx /
          # rate-limit / network — a non-retryable 4xx already exited above via
          # fail_nonretryable_api). We could not observe CI state this poll and no
          # observed check has failed; that is not a CI failure. In waiting mode, treat
          # it like a pending check and re-poll until the deadline rather than aborting
          # the release over an API outage. With WAIT_TIMEOUT=0 the deadline is already
          # past, so a persistent outage still fails fast and closed.
          if [ "${api_error}" -ne 0 ]; then
            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "::error::Could not read CI status for ${SHA} from the GitHub API after retries (transient error, e.g. 5xx). Cannot prove the release base passed CI (${CHECKS_URL}). (Emergency hotfixes can bypass with force=true.)"
              exit 1
            fi
            echo "GitHub API read failed (likely transient); waiting ${POLL_INTERVAL}s before retry (elapsed ${SECONDS}s / timeout ${WAIT_TIMEOUT}s) — ${CHECKS_URL}"
            sleep "${POLL_INTERVAL}"
            continue
          fi

          # No checks/statuses observed yet. When waiting is enabled this is likely a
          # race — the release was dispatched just as the merge-base landed, before CI
          # registered — so treat it as waitable and let later polls see them appear.
          # With WAIT_TIMEOUT=0 the deadline is already past, so the pending branch
          # below still fails fast on the first poll, preserving the original behavior.
          if [ "${total_runs}" -eq 0 ] && [ "${status_total}" -eq 0 ]; then
            echo "No CI check runs or commit statuses found yet for ${SHA}."
            no_results=1
            pending=$((pending + 1))
          fi

          # No failures, but something is still settling (in-progress checks, a
          # pending combined status, or checks not registered yet). Wait and re-poll
          # until the deadline, then give up. With WAIT_TIMEOUT=0 the deadline is
          # already past so this is the original fail-fast behavior.
          if [ "${pending}" -ne 0 ]; then
            if [ "${no_results}" -ne 0 ]; then
              waiting_for="CI to register on ${SHA}"
            else
              waiting_for="${pending} in-progress CI check(s) on ${SHA} to finish (${pending_names})"
            fi
            if [ "${SECONDS}" -ge "${deadline}" ]; then
              if [ "${no_results}" -ne 0 ]; then
                echo "::error::Timed out after ${WAIT_TIMEOUT}s: no CI check runs or commit statuses ever appeared for ${SHA}. Cannot prove the release base passed CI (${CHECKS_URL}). (Emergency hotfixes can bypass with force=true.)"
              else
                echo "::error::Timed out after ${WAIT_TIMEOUT}s waiting for ${waiting_for} (${CHECKS_URL}). (Emergency hotfixes can bypass with force=true.)"
              fi
              exit 1
            fi
            echo "Waiting ${POLL_INTERVAL}s for ${waiting_for} (elapsed ${SECONDS}s / timeout ${WAIT_TIMEOUT}s) — ${CHECKS_URL}"
            sleep "${POLL_INTERVAL}"
            continue
          fi

          # Settled with no failures and nothing pending — exit the poll loop.
          break
        done

        # Every check was skipped/neutral and no green status exists: CI never
        # actually ran (e.g. a #disable-ci gate short-circuit), so there is no
        # passing run to stand behind.
        if [ "${successes}" -eq 0 ]; then
          echo "::error::No successful CI result for ${SHA} (all checks skipped/neutral, no green status). Cannot prove a real CI run passed. (Emergency hotfixes can bypass with force=true.)"
          exit 1
        fi

        echo "CI for ${SHA} is fully green (${successes} successful result(s) across ${total_runs} check run(s))."
