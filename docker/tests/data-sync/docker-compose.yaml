# Data Sync Test Environment
# Uses the shared observability stack from docker/observation

include:
  - path: ../../observation/docker-compose.yaml

services:
  # ==========================================================================
  # Irys Test Nodes
  # ==========================================================================
  test-irys-1:
    image: ${IMAGE_NAME:-localhost/irys-test:latest}
    pull_policy: never
    container_name: test-irys-1
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      observation_network:
        ipv4_address: 172.23.0.2
    ports:
      - "19080:8080"
    environment:
      - RUST_LOG=debug
      - ENABLE_TELEMETRY=true
      - OTEL_SERVICE_NAME=irys-node-1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-collector:4318/v1/logs
    volumes:
      - ./configs/irys-1.toml:/app/config.toml:ro
      - ./configs/.irys_submodules.toml:/app/data/.irys_submodules.toml:ro
    cap_add:
      - NET_ADMIN

  test-irys-2:
    image: ${IMAGE_NAME:-localhost/irys-test:latest}
    pull_policy: never
    container_name: test-irys-2
    restart: unless-stopped
    depends_on:
      test-irys-1:
        condition: service_started
      otel-collector:
        condition: service_healthy
    networks:
      observation_network:
        ipv4_address: 172.23.0.3
    ports:
      - "19081:8080"
    environment:
      - RUST_LOG=debug
      - MIN_HEIGHT=${MIN_HEIGHT:-40}
      - ENABLE_TELEMETRY=true
      - OTEL_SERVICE_NAME=irys-node-2
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-collector:4318/v1/logs
    volumes:
      - ./configs/irys-2.toml:/app/config.toml:ro
      - ./configs/.irys_submodules.toml:/app/data/.irys_submodules.toml:ro
      - ./scripts/start_peer_with_auto_restart.sh:/app/start_peer_with_auto_restart.sh:ro
    cap_add:
      - NET_ADMIN
    entrypoint: ["bash", "/app/start_peer_with_auto_restart.sh"]

  test-irys-3:
    image: ${IMAGE_NAME:-localhost/irys-test:latest}
    pull_policy: never
    container_name: test-irys-3
    restart: unless-stopped
    depends_on:
      test-irys-1:
        condition: service_started
      otel-collector:
        condition: service_healthy
    networks:
      observation_network:
        ipv4_address: 172.23.0.4
    ports:
      - "19082:8080"
    environment:
      - RUST_LOG=debug
      - MIN_HEIGHT=${MIN_HEIGHT:-50}
      - ENABLE_TELEMETRY=true
      - OTEL_SERVICE_NAME=irys-node-3
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://otel-collector:4318/v1/logs
    volumes:
      - ./configs/irys-3.toml:/app/config.toml:ro
      - ./configs/.irys_submodules.toml:/app/data/.irys_submodules.toml:ro
      - ./scripts/start_peer_with_auto_restart.sh:/app/start_peer_with_auto_restart.sh:ro
    cap_add:
      - NET_ADMIN
    entrypoint: ["bash", "/app/start_peer_with_auto_restart.sh"]
